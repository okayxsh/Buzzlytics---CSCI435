# Buzzlytics configuration — single source of truth for tunable values.
detector:
  model_path: cv_pipeline/weights/best.pt
  conf_threshold: 0.25   # in-domain profile (Vietnamese VnPollenBee footage). Raise to 0.4 for out-of-domain.
  iou_threshold: 0.45
  imgsz: 960   # higher = catches more small/packed bees (640->960 ~ +40% recall on dense frames). Lower to 640 for faster video.
  # pollen_bee is the minority/hard class and over-fires on out-of-domain bees
  # (e.g. golden Apis mellifera abdomens read as pollen). Below this a
  # "pollen_bee" is demoted to "bee". 0.3 = in-domain; raise to ~0.55 out-of-domain.
  pollen_min_conf: 0.3
  min_box_width: 12
  min_box_height: 12
  min_box_area_pct: 0.00008
  max_box_aspect_ratio: 4.0

# Stage-2 per-bee varroa classifier (healthy vs varroa). Runs on each
# detected bee crop and upgrades its label to varroa_bee when infected.
# Inert if the weights file is missing (detection still works).
varroa_classifier:
  enabled: true
  model_path: cv_pipeline/weights/varroa_cls.pt
  conf_threshold: 0.85
  min_crop_size: 24
  vote_window: 5
  min_track_hits: 2

varroa_detector:
  enabled: true
  model_path: cv_pipeline/weights/varroa_det.pt
  conf_threshold: 0.35
  iou_threshold: 0.45
  imgsz: 960

tracker:
  track_buffer: 10
  match_thresh: 0.85
  track_high_thresh: 0.55
  track_low_thresh: 0.25
  new_track_thresh: 0.55

analytics:
  varroa_penalty_per_pct: 2.5   # health -= this * infection_rate(%)
  low_pollen_penalty: 5.0        # health -= this when foraging is near zero
  low_pollen_threshold: 1.0      # pollen_rate(%) below this = low foraging
  healthy_score: 70              # >= -> Healthy ; >= warning_score -> Warning ; else Critical
  warning_score: 40

visualize:
  draw_trails: false
  max_trail_length: 20
  colors:
    bee: [0, 200, 0]
    pollen_bee: [0, 220, 255]
    varroa_bee: [0, 0, 220]

motion:
  history: 500
  var_threshold: 16
  detect_shadows: true
  kernel_size: 3

video:
  frame_skip: 5
  max_seconds: 10   # only the first N seconds of an uploaded video are processed (0 = no cap)

preprocess:
  white_balance: true
  clahe_clip_limit: 2.0
  denoise_strength: 0   # NLM denoise costs ~4s/frame at 1080p; off for speed
