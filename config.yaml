# Buzzlytics configuration — single source of truth for tunable values.
detector:
  model_path: cv_pipeline/weights/best.pt
  conf_threshold: 0.25
  iou_threshold: 0.45
  imgsz: 640

tracker:
  max_age: 30
  min_hits: 3
  iou_match: 0.3

analytics:
  pollen_good_threshold: 0.1
  varroa_warn_threshold: 0.15
  wasp_threat_threshold: 0.05
  low_activity_threshold: 0.3
  health_weights:
    base: 70
    pollen_bonus: 10
    varroa_penalty: 20
    wasp_penalty: 25
    low_activity_penalty: 10

visualize:
  colors:
    bee: [0, 200, 0]
    pollen_bee: [0, 220, 255]
    varroa_bee: [0, 0, 220]
    wasp: [0, 140, 255]

video:
  frame_skip: 2

preprocess:
  white_balance: true
  clahe_clip_limit: 2.0
  denoise_strength: 10
